<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contas Fixas — Finança Fácil</title>
  <link rel="stylesheet" href="../contas/contas.css" />
  <style>
    /* Estilos específicos localizados para os Cards de Contas Fixas */
    .fixas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }
    .fixa-card {
      background: #fff; border-radius: var(--radius-lg); padding: 1.25rem;
      box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200);
      display: flex; flex-direction: column; gap: 1rem;
      transition: border-color var(--transition), opacity var(--transition);
    }
    .fixa-card.inativo { opacity: 0.6; filter: grayscale(0.5); }
    .fixa-header { display: flex; align-items: center; justify-content: space-between; }
    .fixa-title-grp { display: flex; align-items: center; gap: .5rem; font-weight: 700; color: var(--gray-900); }
    .fixa-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--gray-100); }
    .fixa-icon svg { width: 18px; height: 18px; stroke: var(--gray-600); }
    
    /* Cores de ícones */
    .icon-aluguel { background: #fee2e2; } .icon-aluguel svg { stroke: #ef4444; }
    .icon-agua { background: #dbeafe; } .icon-agua svg { stroke: #3b82f6; }
    .icon-luz { background: #fef3c7; } .icon-luz svg { stroke: #f59e0b; }
    .icon-internet { background: #e0e7ff; } .icon-internet svg { stroke: #6366f1; }
    .icon-saude { background: #dcfce7; } .icon-saude svg { stroke: #22c55e; }
    .icon-telefone { background: #f3e8ff; } .icon-telefone svg { stroke: #a855f7; }

    /* Toggle switch */
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--gray-300); transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--green-500); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Inputs flat */
    .flat-input-group { display: flex; flex-direction: column; gap: .2rem; }
    .flat-input-group label { font-size: .75rem; color: var(--gray-500); font-weight: 600; }
    .flat-input { border: 1px solid var(--gray-200); border-radius: 6px; padding: .5rem; font-size: .9rem; width: 100%; outline: none; transition: border-color .2s; }
    .flat-input:focus { border-color: var(--green-500); }
    .flat-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
    
    /* Footer botões */
    .save-btn { width: 100%; padding: .6rem; border: none; border-radius: 6px; background: var(--green-600); color: #fff; font-weight: 600; cursor: pointer; margin-top: .5rem; transition: background .2s;}
    .save-btn:hover { background: var(--green-700); }
    .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

  <header class="page-header">
    <h1 class="page-title">📅 Contas Fixas</h1>
    <a href="../../dashboard/dashboard.html" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Voltar
    </a>
  </header>

  <p style="color: var(--gray-500); font-size: .85rem; margin-bottom: 1.5rem; line-height: 1.4;">
    Cadastre o valor padrão das suas contas fixas. Elas aparecerão <strong>automaticamente</strong> na listagem mensal de contas, sem que você precise lançá-elas manualmente todos os meses.
  </p>

  <!-- Resumo -->
  <div class="summary-card" style="padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; text-align: left;">
    <div>
      <p class="summary-title" style="margin: 0;">Total Estimado Mensal (Base)</p>
      <p style="font-size: .75rem; color: var(--gray-400);">Soma das contas fixas ativas</p>
    </div>
    <div class="summary-value" id="totalFixas" style="font-size: 1.5rem;">R$ 0,00</div>
  </div>

  <div id="fixasGrid" class="fixas-grid">
    <div class="empty-state" style="grid-column: 1/-1;">Carregando contas fixas...</div>
  </div>

  <!-- Template Oculto para Card -->
  <template id="tplFixa">
    <div class="fixa-card">
      <div class="fixa-header">
        <div class="fixa-title-grp">
          <div class="fixa-icon">
            <!-- svg injetado no JS -->
          </div>
          <span class="lbl-tipo">Tipo</span>
        </div>
        <label class="switch" title="Ativar/Desativar">
          <input type="checkbox" class="chk-ativo">
          <span class="slider"></span>
        </label>
      </div>
      <div class="flat-row">
        <div class="flat-input-group">
          <label>Valor (R$)</label>
          <input type="number" class="flat-input inp-valor" step="0.01" min="0" placeholder="0.00" />
        </div>
        <div class="flat-input-group">
          <label>Dia de Venc.</label>
          <input type="number" class="flat-input inp-dia" min="1" max="31" placeholder="Ex: 5" />
        </div>
      </div>
      <button class="save-btn hidden">Salvar</button>
    </div>
  </template>

  <script type="module" src="contas-fixas.js"></script>
</body>
</html>
