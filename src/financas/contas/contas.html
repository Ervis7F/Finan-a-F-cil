<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contas a Pagar — Finança Fácil</title>
  <link rel="stylesheet" href="contas.css" />
</head>
<body>

  <header class="page-header">
    <h1 class="page-title">📄 Contas a Pagar</h1>
    <a href="../../dashboard/dashboard.html" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Voltar
    </a>
  </header>

  <!-- Filtro Mês/Ano -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="filterMes">Mês</label>
      <select id="filterMes" class="select-input"></select>
    </div>
    <div class="filter-group">
      <label for="filterAno">Ano</label>
      <input type="number" id="filterAno" class="text-input" />
    </div>
  </div>

  <!-- Resumo -->
  <div class="summary-card">
    <p class="summary-title">Total Pendente do Mês</p>
    <p class="summary-value negative" id="totalPendente">R$ 0,00</p>
  </div>

  <!-- Formulário -->
  <form class="form-card" id="formConta">
    <h3 style="margin-bottom:1rem; font-size:1rem; color: #111827;">Adicionar Nova Conta</h3>
    <div class="form-grid">
      <div class="filter-group">
        <label>Nome (ex: Luz, Nubank)</label>
        <input type="text" id="contaNome" class="text-input" required />
      </div>
      <div class="filter-group">
        <label>Valor (R$)</label>
        <input type="number" id="contaValor" class="text-input" step="0.01" min="0.01" required />
      </div>
    </div>
    <div class="form-grid">
      <div class="filter-group">
        <label>Mês (1-12)</label>
        <select id="contaMes" class="select-input" required></select>
      </div>
      <div class="filter-group">
        <label>Ano</label>
        <input type="number" id="contaAno" class="text-input" required />
      </div>
    </div>
    <button type="submit" class="btn-submit" id="btnSalvar">Salvar Conta</button>
  </form>

  <!-- Lista de Contas -->
  <h3 style="margin-bottom:1rem; font-size:1rem; color: #111827;">Contas do Mês <span id="lblMesAtual"></span></h3>
  <div id="listaContas" class="list-container">
    <div class="empty-state">Carregando contas...</div>
  </div>

  <script type="module" src="contas.js"></script>
</body>
</html>
