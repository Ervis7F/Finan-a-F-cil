<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Finança Fácil</title>
  <meta name="description" content="Acesse sua conta no Finança Fácil e controle suas finanças pessoais." />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon" style="background:transparent; box-shadow:none; width:50px; height:50px;">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="26" height="26" rx="6" fill="#2563eb" stroke="none"></rect>
          <path d="M10 22V10h5a3 3 0 0 1 0 6h-5" stroke="#fff"></path>
          <path d="M13 16l3 6" stroke="#fff"></path>
          <path d="M18 10h6v2h-6zM18 15h5v2h-5zM18 20h6v2h-6z" fill="#fff" stroke="none"></path>
        </svg>
      </div>
      <h1>Finança Fácil</h1>
      <p>Acesse com segurança 👋</p>
    </div>

    <!-- Alerta global -->
    <div id="alertBox" class="alert" role="alert" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertMsg"></span>
    </div>

    <!-- Formulário de login -->
    <form id="loginForm" class="auth-form" novalidate>

      <!-- E-mail -->
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input id="email" type="email" class="form-input" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <span class="field-error" id="emailError"></span>
      </div>

      <!-- Senha -->
      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="senha" type="password" class="form-input" placeholder="Sua senha" autocomplete="current-password" />
          <button type="button" class="btn-toggle-password" id="toggleSenha" aria-label="Mostrar senha">
            <svg id="eyeIconSenha" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="senhaError"></span>
      </div>

      <!-- Link Esqueci-Senha -->
      <div style="text-align:right; margin-top:-.4rem;">
        <a href="esqueci-senha.html" style="font-size:.82rem; color: var(--green-600); font-weight:600; text-decoration:none;">
          Esqueci minha senha
        </a>
      </div>

      <!-- Botão de login -->
      <button type="submit" id="btnEntrar" class="btn-primary">
        <div class="spinner"></div>
        <span class="btn-text">Entrar</span>
      </button>

    </form>

    <!-- Links -->
    <div class="auth-links">
      <span>Não tem conta? <a href="register.html">Criar conta grátis</a></span>
    </div>

  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
