<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha — Finança Fácil</title>
  <meta name="description" content="Recupere o acesso à sua conta no Finança Fácil." />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
        </svg>
      </div>
      <h1>Finança Fácil</h1>
      <p>Recuperação de senha</p>
    </div>

    <!-- Alerta global -->
    <div id="alertBox" class="alert" role="alert" aria-live="polite">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertMsg"></span>
    </div>

    <!-- Instrução -->
    <p style="font-size:.88rem; color: var(--gray-500); margin-bottom:1.2rem; line-height:1.5; text-align:center;">
      Informe o e-mail da sua conta e enviaremos um link para você redefinir sua senha.
    </p>

    <!-- Formulário de recuperação -->
    <form id="esqueciForm" class="auth-form" novalidate>

      <!-- E-mail -->
      <div class="form-group">
        <label for="email">E-mail cadastrado</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input id="email" type="email" class="form-input" placeholder="seu@email.com" autocomplete="email" />
        </div>
        <span class="field-error" id="emailError"></span>
      </div>

      <!-- Botão de envio -->
      <button type="submit" id="btnEnviar" class="btn-primary">
        <div class="spinner"></div>
        <span class="btn-text">Enviar link de recuperação</span>
      </button>

    </form>

    <!-- Links -->
    <div class="auth-links">
      <a href="login.html">← Voltar ao login</a>
    </div>

  </div>

  <script type="module" src="esqueci-senha.js"></script>
</body>
</html>
